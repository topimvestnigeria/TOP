<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TOP | Create Account</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="login-box">


<div class="logo">
TOP
</div>



<h2>
Create Your Account
</h2>



<p class="subtitle">

Join TOP and start your investment journey today.

</p>





<input

type="text"

id="fullname"

placeholder="Full Name"

autocomplete="name"

required>





<input

type="email"

id="email"

placeholder="Email Address"

autocomplete="email"

required>






<input

type="password"

id="password"

placeholder="Create Password"

autocomplete="new-password"

required>






<input

type="password"

id="confirmPassword"

placeholder="Confirm Password"

autocomplete="new-password"

required>






<label for="referralCode">

<i class="fa-solid fa-link"></i>

Referral Code

</label>



<input

type="text"

id="referralCode"

placeholder="Invitation Referral Code"

readonly

required>




<p class="small-text">

<i class="fa-solid fa-lock"></i>

Registration is only available through an invitation link.

</p>






<div class="checkbox">

<label>

<input

type="checkbox"

id="showPassword">

Show Password

</label>

</div>






<button

id="signupBtn"

class="btn">

Create Account

</button>






<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>





<p>

<a href="index.html">

← Back to Home

</a>

</p>




</div>





<script>


const showPassword =
document.getElementById("showPassword");



showPassword.addEventListener(
"change",
()=>{


const type =
showPassword.checked
?
"text"
:
"password";



document.getElementById("password").type =
type;



document.getElementById("confirmPassword").type =
type;



});

</script>




<script

type="module"

src="signup.js">

</script>



</body>

</html>
