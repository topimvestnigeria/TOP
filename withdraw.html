<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>TOP | Withdraw Funds</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="login-box">

    <div class="logo">

        TOP

    </div>

    <h2>

        Withdraw Funds

    </h2>

    <p class="subtitle">

        Withdraw your available wallet balance safely.

    </p>


    <!-- SAVED BANK -->

    <div id="savedBankBox" class="payment-box" style="display:none;">

        <h3>

            <i class="fa-solid fa-building-columns"></i>

            Saved Bank Account

        </h3>

        <p>

            <strong>Bank:</strong>

            <span id="savedBank"></span>

        </p>

        <p>

            <strong>Account Name:</strong>

            <span id="savedName"></span>

        </p>

        <p>

            <strong>Account Number:</strong>

            <span id="savedNumber"></span>

        </p>

        <button
            id="changeBankBtn"
            class="btn">

            Change Bank Account

        </button>

    </div>



    <!-- BANK FORM -->

    <div id="bankForm">

        <label>

            Bank Name

        </label>

        <select id="bank">

            <option value="">Select Bank</option>

            <option>Access Bank</option>

            <option>Citibank</option>

            <option>Ecobank</option>

            <option>Fidelity Bank</option>

            <option>First Bank</option>

            <option>FCMB</option>

            <option>GTBank</option>

            <option>Keystone Bank</option>

            <option>Moniepoint</option>

            <option>Opay</option>

            <option>PalmPay</option>

            <option>Polaris Bank</option>

            <option>Providus Bank</option>

            <option>Sterling Bank</option>

            <option>UBA</option>

            <option>Union Bank</option>

            <option>Unity Bank</option>

            <option>Wema Bank</option>

            <option>Zenith Bank</option>

        </select>


        <label>

            Account Number

        </label>

        <input
            type="text"
            id="accountNumber"
            maxlength="10"
            inputmode="numeric"
            placeholder="Enter 10-digit account number">


        <label>

            Account Name

        </label>

        <input
            type="text"
            id="accountName"
            placeholder="Enter account name">


        <button
            id="saveBankBtn"
            class="btn">

            Save Bank Account

        </button>

    </div>


    <hr>


    <label>

        Withdrawal Amount (₦)

    </label>

    <input
        type="number"
        id="amount"
        placeholder="Enter withdrawal amount"
        min="1">


    <button
        id="withdrawBtn"
        class="btn">

        Submit Withdrawal Request

    </button>


    <p id="status"></p>

    <br>

    <a
        href="dashboard.html"
        class="btn">

        ← Back to Dashboard

    </a>

</div>

<script type="module" src="withdraw.js"></script>

</body>

</html>
