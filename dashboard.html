<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TOP | Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- Header -->

    <header class="top-header">

        <div class="logo">
            TOP
        </div>

        <p id="welcomeUser">
            Welcome 👋
        </p>

        <div class="header-icons">

            <i class="fa-solid fa-bell"></i>

            <a href="profile.html">
                <i class="fa-solid fa-user"></i>
            </a>

        </div>

    </header>


    <!-- Wallet Card -->

    <section class="balance-card">

        <p>Total Wallet Balance</p>

        <h1 id="balance">
            ₦0.00
        </h1>

        <div class="balance-buttons">

            <a href="deposit.html" class="deposit-btn">

                <i class="fa-solid fa-plus"></i>

                Deposit

            </a>

            <a href="withdraw.html" class="withdraw-btn">

                <i class="fa-solid fa-arrow-up"></i>

                Withdraw

            </a>

        </div>

    </section>


    <!-- Quick Menu -->

    <section class="menu-grid">

        <a href="plans.html" class="menu-item">

            <i class="fa-solid fa-chart-line"></i>

            <p>Investment</p>

        </a>

        <a href="history.html" class="menu-item">

            <i class="fa-solid fa-clock-rotate-left"></i>

            <p>History</p>

        </a>

        <a href="profile.html" class="menu-item">

            <i class="fa-solid fa-user"></i>

            <p>Profile</p>

        </a>

        <a href="deposit.html" class="menu-item">

            <i class="fa-solid fa-money-bill-transfer"></i>

            <p>Deposit</p>

        </a>

        <a href="withdraw.html" class="menu-item">

            <i class="fa-solid fa-building-columns"></i>

            <p>Withdraw</p>

        </a>

        <a href="admin.html" class="menu-item">

            <i class="fa-solid fa-user-shield"></i>

            <p>Admin</p>

        </a>

    </section>


    <!-- Active Investment -->

    <section class="card">

        <h2>

            <i class="fa-solid fa-chart-column"></i>

            Active Investment

        </h2>

        <div id="activeInvestment">

            <p>No active investment yet.</p>

        </div>

    </section>


    <!-- Referral -->

    <section class="referral-card">

        <h2>

            <i class="fa-solid fa-user-plus"></i>

            Referral Program

        </h2>

        <p>

            Invite friends and earn referral rewards.

        </p>

        <p>

            <strong>Your Referral Code</strong>

        </p>

        <h3 id="referralCode">

            Loading...

        </h3>

        <button
            id="copyReferralBtn"
            class="btn">

            Copy Referral Code

        </button>

    </section>


    <!-- Bottom Navigation -->

    <nav class="bottom-nav">

        <a href="dashboard.html" class="nav-item active">

            <i class="fa-solid fa-house"></i>

            <p>Home</p>

        </a>

        <a href="plans.html" class="nav-item">

            <i class="fa-solid fa-chart-line"></i>

            <p>Plans</p>

        </a>

        <a href="history.html" class="nav-item">

            <i class="fa-solid fa-clock"></i>

            <p>History</p>

        </a>

        <a href="profile.html" class="nav-item">

            <i class="fa-solid fa-user"></i>

            <p>Account</p>

        </a>

    </nav>


    <script type="module" src="dashboard.js"></script>

</body>

</html>
