<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TOP | Profile</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="login-box">


    <div class="logo">
        TOP
    </div>


    <h2>
        My Profile
    </h2>



    <div class="payment-box">


        <p>
            <strong>
            Full Name:
            </strong>

            <span id="fullname">
            Loading...
            </span>

        </p>



        <p>
            <strong>
            Email:
            </strong>

            <span id="email">
            Loading...
            </span>

        </p>



        <p>
            <strong>
            Wallet Balance:
            </strong>

            ₦<span id="balance">
            0
            </span>

        </p>



        <p>
            <strong>
            Total Profit:
            </strong>

            ₦<span id="totalProfit">
            0
            </span>

        </p>



        <p>
            <strong>
            Referral Bonus:
            </strong>

            ₦<span id="referralBonus">
            0
            </span>

        </p>



        <p>
            <strong>
            Referral Code:
            </strong>

            <span id="referralCode">
            Loading...
            </span>

        </p>



    </div>




    <h3>
        Bank Account
    </h3>


    <div class="payment-box">


        <p>
            <strong>
            Bank:
            </strong>

            <span id="bankName">
            Not Added
            </span>

        </p>



        <p>
            <strong>
            Account Number:
            </strong>

            <span id="accountNumber">
            Not Added
            </span>

        </p>



        <p>
            <strong>
            Account Name:
            </strong>

            <span id="accountName">
            Not Added
            </span>

        </p>


    </div>




    <button 
    id="logoutBtn"
    class="btn">

        Logout

    </button>



    <br><br>



    <a href="dashboard.html" class="btn">

        ← Back to Dashboard

    </a>



</div>



<script type="module" src="profile.js"></script>


</body>

</html>
